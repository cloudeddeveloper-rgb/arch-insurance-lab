server:
  port: 8083

spring:
  application:
    name: policy-service
  datasource:
    url: jdbc:postgresql://localhost:5432/policydb
    username: appuser
    password: apppass
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.format_sql: true
  threads:
    virtual:
      enabled: true

# Downstream service locations (relaxed binding -> ServiceProperties record).
services:
  customer-base-url: http://localhost:8081
  rating-base-url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
